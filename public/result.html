<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M5-ticket Find Book Travel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script> -->
    <style>
      /* ── TOKENS ─────────────────────────────────────────── */
      :root {
        /* ── #0022D2 ELECTRIC BLUE SYSTEM ─────────────────── */
        --indigo: #0022d2; /* Main Accent: Form borders, hero banner, primary buttons */
        --indigo-dark: #0019a8; /* Hover State: Slightly deeper blue for button interaction */
        --indigo-dim: #3b5aff; /* Active Focus: Lighter, sharp highlight variant for input focus */
        --indigo-tint: #ebedff; /* Soft Panel Base: Clean light blue tint for list frames or backgrounds */
        --indigo-mid: rgba(
          0,
          34,
          210,
          0.12
        ); /* Transparency Layer: Subtle blue box shadow ring overlay */

        --black: #0a0a0a;
        --grey-900: #111111;
        --grey-700: #3a3a3a;
        --grey-500: #6b6b6b;
        --grey-300: #c4c4c4;
        --grey-100: #f2f2f2;
        --white: #ffffff;
        --green: #00c853;
        --orange: #ff9800;
        --red: #f44336;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 18px;
        --radius-pill: 999px;
        --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
        /* ── MATCHING SHADOW ACCENT ─────────────────────────── */
        --shadow-btn: 0 4px 14px rgba(0, 34, 210, 0.35); /* Button elevation glow shadow */
        --font: "Inter", system-ui, sans-serif;
        --transition: 0.18s ease;
      }

      /* ── RESET ───────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-family: var(--font);
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
      }
      body {
        background: var(--grey-100);
        color: var(--black);
        min-height: 100dvh;
      }
      button {
        cursor: pointer;
        border: none;
        background: none;
        font-family: inherit;
      }
      input {
        font-family: inherit;
        outline: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── HEADER ─────────────────────────────────────────── */
      .header {
        background: var(--white);
        border-bottom: 1px solid rgba(0, 0, 0, 0.07);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-inner {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 16px;
        height: 56px;
        display: flex;
        align-items: center;
        /* 1. CHANGED: Centers the flex items horizontally */
        justify-content: center;
        /* 2. ADDED: Adds a clean gap space between the logo and navigation */
        gap: 40px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon {
        width: 34px;
        height: 34px;
        border-radius: var(--radius-sm);
        background: var(--indigo);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo-icon svg {
        width: 18px;
        height: 18px;
        fill: var(--white);
      }
      .logo-name {
        font-size: 18px;
        font-weight: 700;
        color: var(--indigo);
        letter-spacing: -0.4px;
      }
      .logo-tag {
        font-size: 9px;
        color: var(--grey-500);
        letter-spacing: 1px;
        display: none;
      }
      .header-nav {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .nav-chip {
        font-size: 12px;
        font-weight: 500;
        color: var(--grey-700);
        padding: 6px 12px;
        border-radius: var(--radius-pill);
        border: 1px solid transparent;
        transition: var(--transition);
      }
      .nav-chip:hover {
        background: var(--indigo-tint);
        color: var(--indigo);
      }
      .nav-chip.active {
        background: var(--indigo);
        color: var(--white);
      }
      .btn-login {
        font-size: 13px;
        font-weight: 600;
        color: var(--indigo);
        padding: 7px 16px;
        border-radius: var(--radius-pill);
        border: 1.5px solid var(--indigo);
        transition: var(--transition);
      }
      .btn-login:hover {
        background: var(--indigo);
        color: var(--white);
      }

      /* ── HERO BAND ──────────────────────────────────────── */
      .hero {
        background: var(--indigo);
        padding: 28px 16px 72px;
        text-align: center;
      }
      .hero-eyebrow {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      .hero-title {
        font-size: clamp(22px, 5vw, 34px);
        font-weight: 700;
        color: var(--white);
        line-height: 1.2;
        letter-spacing: -0.5px;
      }
      .hero-title span {
        color: rgba(255, 255, 255, 0.55);
        font-weight: 400;
      }

      /* ── QUICK TABS ─────────────────────────────────────── */
      .quick-tabs {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 18px;
        flex-wrap: wrap;
      }
      .qtab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: var(--radius-pill);
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.75);
        transition: var(--transition);
        background: transparent;
      }
      .qtab svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }
      .qtab.active,
      .qtab:hover {
        background: var(--white);
        color: var(--indigo);
        border-color: var(--white);
      }

      /* ── CARD ───────────────────────────────────────────── */
      .card-wrap {
        max-width: 640px;
        margin: -48px auto 0;
        padding: 0 16px;
      }
      .card {
        background: var(--white);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        overflow: hidden;
      }
      .card-head {
        padding: 20px 20px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .card-head-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--black);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .card-head-title svg {
        width: 18px;
        height: 18px;
        fill: var(--indigo);
      }
      .irctc-badge {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 10px;
        font-weight: 600;
        color: var(--grey-500);
        letter-spacing: 0.3px;
      }
      .irctc-badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
      }

      /* ── FORM ───────────────────────────────────────────── */
      #ticket-form {
        padding: 16px 20px 20px;
      }

      .field-row {
        display: grid;
        gap: 10px;
        margin-bottom: 10px;
      }
      .field-row.two {
        grid-template-columns: 1fr 1fr;
      }
      .field-row.three {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        position: relative;
      }
      .field-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--grey-500);
        letter-spacing: 0.6px;
        text-transform: uppercase;
        padding-left: 2px;
      }
      .field-input-wrap {
        display: flex;
        align-items: center;
        border: 1.5px solid var(--grey-300);
        border-radius: var(--radius-sm);
        background: var(--white);
        transition:
          border-color var(--transition),
          box-shadow var(--transition);
        overflow: hidden;
      }
      .field-input-wrap:focus-within {
        border-color: var(--indigo);
        box-shadow: 0 0 0 3px var(--indigo-mid);
      }
      .field-icon {
        padding: 0 10px;
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      .field-icon svg {
        width: 15px;
        height: 15px;
        fill: var(--grey-300);
        transition: fill var(--transition);
      }
      .field-input-wrap:focus-within .field-icon svg {
        fill: var(--indigo);
      }

      .form-input {
        width: 100%;
        padding: 11px 12px 11px 0;
        font-size: 14px;
        font-weight: 500;
        color: var(--black);
        border: none;
        background: transparent;
        /* CORRECTED: Added the leading dashes and cross-browser backups */
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
      }

      .form-input::placeholder {
        color: var(--grey-300);
        font-weight: 400;
      }
      .form-input::-webkit-inner-spin-button,
      .form-input::-webkit-calendar-picker-indicator {
        opacity: 0;
      }

      /* swap button */
      .swap-wrap {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 2px;
      }
      .swap-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--indigo-tint);
        border: 1.5px solid rgba(63, 0, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
      }
      .swap-btn svg {
        width: 16px;
        height: 16px;
        fill: var(--indigo);
      }
      .swap-btn:hover {
        background: var(--indigo);
      }
      .swap-btn:hover svg {
        fill: var(--white);
      }

      /* quota select */
      .field-select {
        width: 100%;
        padding: 11px 12px 11px 0;
        font-size: 14px;
        font-weight: 500;
        color: var(--black);
        border: none;
        background: transparent;
        -webkit-appearance: none;
        appearance: none;
        cursor: pointer;
      }

      /* tatkal row */
      .tatkal-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        margin-bottom: 10px;
        border-radius: var(--radius-sm);
        background: var(--indigo-tint);
        border: 1px solid rgba(63, 0, 255, 0.15);
      }
      .tatkal-row input[type="checkbox"] {
        accent-color: var(--indigo);
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .tatkal-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--black);
        flex: 1;
      }
      .tatkal-badge {
        font-size: 10px;
        font-weight: 700;
        color: var(--white);
        background: var(--indigo);
        padding: 2px 8px;
        border-radius: var(--radius-pill);
        letter-spacing: 0.3px;
      }

      /* submit */
      .btn-search {
        width: 100%;
        padding: 15px;
        background: var(--indigo);
        color: var(--white);
        font-size: 15px;
        font-weight: 700;
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-btn);
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 4px;
      }
      .btn-search svg {
        width: 18px;
        height: 18px;
        fill: var(--white);
      }
      .btn-search:hover {
        background: var(--indigo-dark);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(63, 0, 255, 0.4);
      }
      .btn-search:active {
        transform: translateY(0);
      }
      .btn-search.loading {
        opacity: 0.75;
        pointer-events: none;
      }

      /* ── QUICK ACTIONS ──────────────────────────────────── */
      .quick-actions {
        max-width: 640px;
        margin: 14px auto 0;
        padding: 0 16px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .qa-item {
        background: var(--white);
        border-radius: var(--radius-md);
        padding: 12px 8px;
        text-align: center;
        box-shadow: var(--shadow-card);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
      }
      .qa-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
      }
      .qa-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: var(--indigo-tint);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .qa-icon svg {
        width: 18px;
        height: 18px;
        fill: var(--indigo);
      }
      .qa-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--black);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        line-height: 1.3;
      }
      .qa-pill {
        position: absolute;
        top: 6px;
        right: 6px;
        font-size: 9px;
        font-weight: 700;
        color: var(--white);
        padding: 2px 6px;
        border-radius: var(--radius-pill);
        background: var(--green);
      }
      .qa-pill.offer {
        background: var(--indigo);
      }

      /* ── RESULTS ────────────────────────────────────────── */
      .results-wrap {
        max-width: 640px;
        margin: 16px auto 0;
        padding: 0 16px 80px;
      }
      .results-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .results-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--black);
      }
      .results-count {
        font-size: 12px;
        font-weight: 500;
        color: var(--grey-500);
        background: var(--grey-100);
        padding: 4px 10px;
        border-radius: var(--radius-pill);
      }

      /* result card */
      .result-card {
        background: var(--white);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-card);
        margin-bottom: 10px;
        overflow: hidden;
        border: 1px solid rgba(0, 0, 0, 0.05);
        animation: slideUp 0.25s ease both;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .rc-top {
        padding: 14px 16px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .rc-train-name {
        font-size: 14px;
        font-weight: 700;
        color: var(--black);
      }
      .rc-train-no {
        font-size: 11px;
        color: var(--grey-500);
        margin-top: 2px;
      }
      .rc-avail {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: var(--radius-pill);
        flex-shrink: 0;
      }
      .avail-yes {
        background: #e6f9ee;
        color: #00873a;
      }
      .avail-wl {
        background: #fff3e0;
        color: #e65100;
      }
      .avail-rak {
        background: #fbe9e7;
        color: #bf360c;
      }

      .rc-route {
        padding: 0 16px 14px;
        display: flex;
        align-items: center;
        gap: 0;
      }
      .rc-stn {
        flex: 1;
      }
      .rc-time {
        font-size: 18px;
        font-weight: 700;
        color: var(--black);
      }
      .rc-code {
        font-size: 11px;
        color: var(--grey-500);
        margin-top: 1px;
      }
      .rc-line {
        flex: 2;
        display: flex;
        align-items: center;
        gap: 0;
        position: relative;
        padding: 0 8px;
      }
      .rc-line-bar {
        flex: 1;
        height: 1.5px;
        background: var(--grey-300);
        position: relative;
      }
      .rc-line-bar::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--indigo);
        box-shadow: 0 0 0 3px var(--indigo-tint);
      }
      .rc-dur {
        font-size: 10px;
        color: var(--grey-500);
        white-space: nowrap;
        padding: 0 6px;
      }

      .rc-bottom {
        border-top: 1px solid var(--grey-100);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .rc-class-chips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .rc-chip {
        font-size: 10px;
        font-weight: 600;
        color: var(--grey-700);
        padding: 3px 8px;
        border-radius: var(--radius-pill);
        background: var(--grey-100);
        border: 1px solid transparent;
      }
      .rc-chip.active {
        border-color: var(--indigo);
        color: var(--indigo);
        background: var(--indigo-tint);
      }
      .rc-price-btn {
        background: var(--indigo);
        color: var(--white);
        font-size: 13px;
        font-weight: 700;
        padding: 9px 18px;
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-btn);
        white-space: nowrap;
        transition: var(--transition);
      }
      .rc-price-btn:hover {
        background: var(--indigo-dark);
      }

      /* raw json fallback */
      .result-raw {
        background: var(--grey-900);
        color: #b0ffb0;
        font-size: 11px;
        font-family: monospace;
        line-height: 1.6;
        padding: 16px;
        border-radius: var(--radius-md);
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* state cards */
      .state-card {
        background: var(--white);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-card);
        padding: 40px 20px;
        text-align: center;
      }
      .state-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .state-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--black);
        margin-bottom: 6px;
      }
      .state-sub {
        font-size: 13px;
        color: var(--grey-500);
        line-height: 1.5;
      }
      .state-sub.error {
        color: var(--red);
      }

      /* spinner */
      .spinner {
        width: 20px;
        height: 20px;
        border: 2.5px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }
      .loading .spinner {
        display: block;
      }
      .loading .btn-text {
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── FOOTER NAV (mobile) ────────────────────────────── */
      .footer-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--white);
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        display: flex;
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .fn-item {
        flex: 1;
        padding: 10px 4px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-weight: 600;
        color: var(--grey-500);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        transition: color var(--transition);
      }
      .fn-item svg {
        width: 22px;
        height: 22px;
        fill: var(--grey-300);
        transition: fill var(--transition);
      }
      .fn-item.active {
        color: var(--indigo);
      }
      .fn-item.active svg {
        fill: var(--indigo);
      }

      /* ── DESKTOP OVERRIDES ──────────────────────────────── */
      @media (min-width: 640px) {
        .hero {
          padding: 48px 16px 88px;
        }
        .logo-tag {
          display: block;
        }
        .footer-nav {
          display: none;
        }
        body {
          padding-bottom: 0;
        }
        .quick-actions {
          grid-template-columns: repeat(4, 1fr);
        }
        .field-row.mobile-stack {
          grid-template-columns: 1fr 1fr 1fr;
        }
        .card-head {
          padding: 24px 24px 0;
        }
        #ticket-form {
          padding: 20px 24px 24px;
        }
      }
      @media (max-width: 639px) {
        body {
          padding-bottom: 64px;
        }
        .header-nav .nav-chip {
          display: none;
        }
        .field-row.three {
          grid-template-columns: 1fr 1fr;
        }
        .field-row.three .field:last-child {
          grid-column: span 2;
        }
      }
    </style>
  </head>
  <body>
    <!-- ══ HEADER ══════════════════════════════════════════ -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M4 4h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 2v8h16V6H4zm-1 10l-1 3h20l-1-3H3zm5 1h8v1H8v-1zM6 9h12v2H6V9zm0-2h12v1H6V7z"
              />
            </svg>
          </div>
          <div>
            <div class="logo-name">M5-ticket</div>
            <div class="logo-tag">Find - Book - Travel</div>
          </div>
        </div>
        <!-- <nav class="header-nav">

            </div>

                  <svg viewBox="0 0 24 24">

                </span>
                <select class="field-select" id="Coach" name="coach">
                  <option value="">Any</option>
                  <option value="SL">SL — Sleeper</option>
                  <option value="3A">3A — AC 3 Tier</option>
                  <option value="2A">2A — AC 2 Tier</option>
                  <option value="1A">1A — AC First</option>
                  <option value="CC">CC — Chair Car</option>
                  <option value="EC">EC — Exec Chair</option>
                  <option value="2S">2S — Second Sit</option>

              </div>
            </div>
            <div class="field">
              <label class="field-label" for="Quota">Quota</label>
              <div class="field-input-wrap">
                <span class="field-icon">
                  <svg viewBox="0 0 24 24">

                  <option value="LD">LD — Ladies</option>
                  <option value="SS">SS — Sr Citizen</option>
                  <option value="DF">DF — Defence</option>
                </select>
              </div>
            </div>

              Search Ticket
